name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build Linux (AppImage, deb, rpm, snap)
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage deb rpm snap --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tar.gz for Flatpak
        run: |
          cd dist/linux-unpacked
          tar -czf ../whatsnux-linux-x64.tar.gz .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/*.rpm
            electron/dist/*.snap
            electron/dist/whatsnux-linux-x64.tar.gz
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Build Windows (NSIS installer + portable)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows packages
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            electron/dist/*.exe
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/linux/*
            artifacts/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to Snap Store
  # ─────────────────────────────────────────────────────────────────────────
  publish-snap:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store
        run: |
          SNAP_FILE=$(find artifacts -name '*.snap' | head -1)
          snapcraft upload "$SNAP_FILE" --release=stable
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  # ─────────────────────────────────────────────────────────────────────────
  # Build & Publish Flatpak
  # ─────────────────────────────────────────────────────────────────────────
  publish-flatpak:
    needs: publish-release
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts

      - name: Update Flatpak manifest with real sha256
        run: |
          TAR_FILE=$(find artifacts -name 'whatsnux-linux-x64.tar.gz' | head -1)
          SHA256=$(sha256sum "$TAR_FILE" | awk '{print $1}')
          TAG_NAME="${GITHUB_REF_NAME}"
          sed -i "s|url:.*whatsnux-linux-x64.tar.gz|url: https://github.com/albreis/whatsnux/releases/download/${TAG_NAME}/whatsnux-linux-x64.tar.gz|" flatpak/br.com.ersolucoesweb.Whatsnux.yml
          sed -i "s|sha256:.*|sha256: ${SHA256}|" flatpak/br.com.ersolucoesweb.Whatsnux.yml

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/br.com.ersolucoesweb.Whatsnux.yml
          bundle: whatsnux.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          files: whatsnux.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
